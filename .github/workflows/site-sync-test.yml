# .github/workflows/site-sync-test.yml
# Syncs the default site and tests that a sync completes successfully on pull
# requests.
name: Test Default Site Sync
on:
  pull_request:
    types: [opened, synchronize, reopened]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true 
jobs:
  test_site_sync:
    runs-on: ubuntu-latest
    container:
      image: pookmish/drupal8ci:php8.3
      options: '--network-alias drupal8ci'
    env:
      REAL_AES_ENCRYPTION: ${{secrets.REAL_AES_ENCRYPTION}}
      DRUPAL_DATABASE_NAME: drupal
      DRUPAL_DATABASE_USERNAME: drupal
      DRUPAL_DATABASE_PASSWORD: drupal
      DRUPAL_DATABASE_HOST: mysql
      themePath: docroot/themes/humsci/humsci_basic
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: drupal
          MYSQL_USER: drupal
          MYSQL_PASSWORD: drupal
          MYSQL_ROOT_PASSWORD: drupal
        ports:
          - 33306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY }}
          name: id_rsa
          known_hosts: ${{ secrets.KNOWN_HOSTS }}
          if_key_exists: fail
      - uses: actions/checkout@v6
      - name: Set up Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: ${{ env.themePath }}/package-lock.json
      - name: Install theme dependencies
        run: npm ci --prefix $themePath
      - name: Lint Theme
        run: npm run lint --prefix $themePath
      - name: Restore Cache
        uses: actions/cache@v5
        with:
          path: |
            vendor
            docroot/core
            docroot/libraries
            docroot/modules/contrib
          key: 1.0-${{ hashFiles('drush/drush.yml') }}-${{ hashFiles('composer.json') }}-${{ hashFiles('composer.lock') }}
      - run: git config --system --add safe.directory '*'
      - name: Sync Default Site
        run: |
          mysql -h mysql -P 3306 -u root -pdrupal -e 'SET GLOBAL max_allowed_packet=67108864;' &&
          rm -rf /var/www/html &&
          ln -snf $GITHUB_WORKSPACE /var/www/html &&
          ssh-keyscan -t rsa humscigryphon.ssh.prod.acquia-sites.com >> /root/.ssh/known_hosts &&
          composer install -n &&
          drush sws:multisite:settings &&
          mkdir -p docroot/sites/default/files &&
          chmod -R 777 docroot/sites/default/files/ &&
          drush sws:site:sync --site=default -n
