name: Unit, Acceptance and Functional Tests
on:
  pull_request:
    types: [opened, synchronize, reopened]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  themePath: docroot/themes/humsci/humsci_basic
jobs:
  test_phpunit:
    runs-on: ubuntu-latest
    container:
      image: pookmish/drupal8ci:php8.3
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: drupal
          MYSQL_USER: drupal
          MYSQL_PASSWORD: drupal
          MYSQL_ROOT_PASSWORD: drupal
        ports:
          - 33306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v6
      - name: Restore Cache
        uses: actions/cache@v5
        with:
          path: |
            vendor
            docroot/core
            docroot/libraries
            docroot/modules/contrib
          key: 1.0-${{ hashFiles('drush/drush.yml') }}-${{ hashFiles('composer.json') }}-${{ hashFiles('composer.lock') }}
      - name: Run Unit Tests
        run: |
          git config --system --add safe.directory '*' &&
          composer install -n &&
          mkdir -p docroot/sites/simpletest &&
          drush sws:source:tests:phpunit --db-host=mysql --db-pass=drupal --db-name=drupal --db-user=drupal --with-coverage
      - name: Save Test Results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: unit-tests-results
          path: $GITHUB_WORKSPACE/artifacts
  lint_theme:
    runs-on: ubuntu-latest
    container:
      image: pookmish/drupal8ci:php8.3
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: ${{ env.themePath }}/package-lock.json
      - name: Install theme dependencies
        run: npm ci --prefix $themePath
      - name: Lint Theme
        run: npm run lint --prefix $themePath
  test_functional:
    runs-on: ubuntu-latest
    needs: lint_theme
    container:
      image: pookmish/drupal8ci:php8.3
      options: '--network-alias drupal8ci'
    env:
      REAL_AES_ENCRYPTION: ${{secrets.REAL_AES_ENCRYPTION}}
      DRUPAL_DATABASE_NAME: drupal
      DRUPAL_DATABASE_USERNAME: drupal
      DRUPAL_DATABASE_PASSWORD: drupal
      DRUPAL_DATABASE_HOST: mysql
    services:
      selenium:
        image: selenium/standalone-chrome:130.0
        options: '--shm-size="2g"'
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: drupal
          MYSQL_USER: drupal
          MYSQL_PASSWORD: drupal
          MYSQL_ROOT_PASSWORD: drupal
        ports:
          - 33306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: ${{ env.themePath }}/package-lock.json
      - name: Restore Cache
        uses: actions/cache@v5
        with:
          path: |
            vendor
            docroot/core
            docroot/libraries
            docroot/modules/contrib
          key: 1.0-${{ hashFiles('drush/drush.yml') }}-${{ hashFiles('composer.json') }}-${{ hashFiles('composer.lock') }}
      - run: git config --system --add safe.directory '*'
      - name: Install Site
        run: |
          mysql -h mysql -P 3306 -u root -pdrupal -e 'SET GLOBAL max_allowed_packet=67108864;' &&
          rm -rf /var/www/html &&
          ln -snf $GITHUB_WORKSPACE /var/www/html &&
          composer install -n &&
          mkdir -p docroot/sites/default/files &&
          chmod -R 777 docroot/sites/default/files/ &&
          drush sws:multisite:install -n
      - name: Install theme dependencies
        run: npm ci --prefix $themePath
      - name: Compile theme assets
        run: npm run build --prefix $themePath
      - name: Codeception Functional Tests
        run: |
          apachectl stop
          apachectl start
          drush sws:codeception --suite=functional --group=install
      - name: Save Functional Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: codeception--functional
          path: /var/www/html/artifacts
  test_acceptance:
    runs-on: ubuntu-latest
    needs: lint_theme
    container:
      image: pookmish/drupal8ci:php8.3
      options: '--network-alias drupal8ci'
    env:
      REAL_AES_ENCRYPTION: ${{secrets.REAL_AES_ENCRYPTION}}
      DRUPAL_DATABASE_NAME: drupal
      DRUPAL_DATABASE_USERNAME: drupal
      DRUPAL_DATABASE_PASSWORD: drupal
      DRUPAL_DATABASE_HOST: mysql
    services:
      selenium:
        image: selenium/standalone-chrome:130.0
        options: '--shm-size="2g"'
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: drupal
          MYSQL_USER: drupal
          MYSQL_PASSWORD: drupal
          MYSQL_ROOT_PASSWORD: drupal
        ports:
          - 33306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: ${{ env.themePath }}/package-lock.json
      - name: Restore Cache
        uses: actions/cache@v5
        with:
          path: |
            vendor
            docroot/core
            docroot/libraries
            docroot/modules/contrib
          key: 1.0-${{ hashFiles('drush/drush.yml') }}-${{ hashFiles('composer.json') }}-${{ hashFiles('composer.lock') }}
      - run: git config --system --add safe.directory '*'
      - name: Install Site
        run: |
          mysql -h mysql -P 3306 -u root -pdrupal -e 'SET GLOBAL max_allowed_packet=67108864;' &&
          rm -rf /var/www/html &&
          ln -snf $GITHUB_WORKSPACE /var/www/html &&
          composer install -n &&
          mkdir -p docroot/sites/default/files &&
          chmod -R 777 docroot/sites/default/files/ &&
          drush sws:multisite:install -n
      - name: Install theme dependencies
        run: npm ci --prefix $themePath
      - name: Compile theme assets
        run: npm run build --prefix $themePath
      - name: Codeception Acceptance Tests
        run: |
          apachectl stop
          apachectl start
          drush sws:codeception --suite=acceptance --group=install -vv
      - name: Save Acceptance Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: codeception--acceptance
          path: /var/www/html/artifacts
  deploy_branch:
    needs:
      - test_phpunit
      - lint_theme
      - test_functional
      - test_acceptance
    runs-on: ubuntu-latest
    container:
      image: pookmish/drupal8ci:php8.3
      options: '--network-alias drupal8ci'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
      - name: Set up Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: ${{ env.themePath }}/package-lock.json
      - name: Restore Cache
        uses: actions/cache@v5
        with:
          path: |
            vendor
            docroot/core
            docroot/libraries
            docroot/modules/contrib
          key: 1.0-${{ hashFiles('drush/drush.yml') }}-${{ hashFiles('composer.json') }}-${{ hashFiles('composer.lock') }}
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY }}
          name: id_rsa
          known_hosts: ${{ secrets.KNOWN_HOSTS }}
          if_key_exists: fail
      - run: git config --system --add safe.directory '*'
      - name: Install theme dependencies
        run: npm ci --prefix $themePath
      - name: Deploy Branch
        run: |
          git config --global user.email "sws-developers@lists.stanford.edu" &&
          git config --global user.name "Github Actions" &&
          ssh-keyscan -t rsa svn-2314.prod.hosting.acquia.com >> /root/.ssh/known_hosts &&
          composer install -n &&
          drush sws:artifact:deploy -v -n
