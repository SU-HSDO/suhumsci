name: Unit, Acceptance and Functional Tests
on:
  pull_request:
    types: [opened, synchronize, reopened]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  themePath: docroot/themes/humsci/humsci_basic
jobs:
  test_phpunit:
    runs-on: ubuntu-latest
    container:
      image: pookmish/drupal8ci:php8.3
      options: '--network-alias drupal8ci'
    env:
      REAL_AES_ENCRYPTION: ${{secrets.REAL_AES_ENCRYPTION}}
      DRUPAL_DATABASE_NAME: drupal
      DRUPAL_DATABASE_USERNAME: drupal
      DRUPAL_DATABASE_PASSWORD: drupal
      DRUPAL_DATABASE_HOST: mysql
    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_DATABASE: drupal
          MYSQL_USER: drupal
          MYSQL_PASSWORD: drupal
          MYSQL_ROOT_PASSWORD: drupal
        ports:
          - 33306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - name: Restore Cache
        uses: actions/cache@v4
        with:
          path: |
            vendor
            docroot/core
            docroot/libraries
            docroot/modules/contrib
          key: 1.0-${{ hashFiles('blt/blt.yml') }}-${{ hashFiles('composer.json') }}-${{ hashFiles('composer.lock') }}
      - run: git config --system --add safe.directory '*'
      - name: Install Dependencies
        run: |
          mysql -h mysql -P 3306 -u root -pdrupal -e 'SET GLOBAL max_allowed_packet=67108864;' &&
          rm -rf /var/www/html &&
          ln -snf $GITHUB_WORKSPACE /var/www/html &&
          composer install -n &&
          vendor/bin/blt blt:telemetry:disable --no-interaction &&
          blt settings &&
          mkdir -p docroot/sites/default/files &&
          chmod -R 777 docroot/sites/default/files/
      - name: PHPUnit Tests
        run: |
          blt tests:phpunit:coverage --no-interaction
  lint_theme:
    runs-on: ubuntu-latest
    container:
      image: pookmish/drupal8ci:php8.3
    steps:
      - uses: actions/checkout@v4
      - name: Cache theme node_modules
        id: cache-theme-node-modules
        uses: actions/cache@v4
        with:
          path: ${{ env.themePath }}/node_modules
          key: ${{ runner.os }}-${{ hashFiles(format('{0}/package-lock.json', env.themePath)) }}
      - name: Install theme node_modules
        if: steps.cache-theme-node-modules.outputs.cache-hit != 'true'
        run: npm install --prefix $themePath
      - name: Lint Theme
        run: npm run lint --prefix $themePath
  test_functional:
    runs-on: ubuntu-latest
    needs: lint_theme
    container:
      image: pookmish/drupal8ci:php8.3
      options: '--network-alias drupal8ci'
    env:
      REAL_AES_ENCRYPTION: ${{secrets.REAL_AES_ENCRYPTION}}
      DRUPAL_DATABASE_NAME: drupal
      DRUPAL_DATABASE_USERNAME: drupal
      DRUPAL_DATABASE_PASSWORD: drupal
      DRUPAL_DATABASE_HOST: mysql
    services:
      selenium:
        image: selenium/standalone-chrome:130.0
        options: '--shm-size="2g"'
      mysql:
        image: mysql:5.7
        env:
          MYSQL_DATABASE: drupal
          MYSQL_USER: drupal
          MYSQL_PASSWORD: drupal
          MYSQL_ROOT_PASSWORD: drupal
        ports:
          - 33306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - name: Restore Cache
        uses: actions/cache@v4
        with:
          path: |
            vendor
            docroot/core
            docroot/libraries
            docroot/modules/contrib
          key: 1.0-${{ hashFiles('blt/blt.yml') }}-${{ hashFiles('composer.json') }}-${{ hashFiles('composer.lock') }}
      - run: git config --system --add safe.directory '*'
      - name: Install Site
        run: |
          mysql -h mysql -P 3306 -u root -pdrupal -e 'SET GLOBAL max_allowed_packet=67108864;' &&
          rm -rf /var/www/html &&
          ln -snf $GITHUB_WORKSPACE /var/www/html &&
          composer install -n &&
          vendor/bin/blt blt:telemetry:disable --no-interaction &&
          blt settings &&
          mkdir -p docroot/sites/default/files &&
          chmod -R 777 docroot/sites/default/files/ &&
          blt drupal:install -n
      - name: Restore theme node_modules
        uses: actions/cache@v4
        with:
          path: ${{ env.themePath }}/node_modules
          key: ${{ runner.os }}-${{ hashFiles(format('{0}/package-lock.json', env.themePath)) }}
      - name: Compile theme assets
        run: npm run build --prefix $themePath
      - name: Codeception Functional Tests
        run: |
          apachectl stop
          apachectl start
          blt codeception --group=install --suite=functional
      - name: Save Functional Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codeception--functional
          path: /var/www/html/artifacts
  test_acceptance:
    runs-on: ubuntu-latest
    needs: lint_theme
    container:
      image: pookmish/drupal8ci:php8.3
      options: '--network-alias drupal8ci'
    env:
      REAL_AES_ENCRYPTION: ${{secrets.REAL_AES_ENCRYPTION}}
      DRUPAL_DATABASE_NAME: drupal
      DRUPAL_DATABASE_USERNAME: drupal
      DRUPAL_DATABASE_PASSWORD: drupal
      DRUPAL_DATABASE_HOST: mysql
    services:
      selenium:
        image: selenium/standalone-chrome:130.0
        options: '--shm-size="2g"'
      mysql:
        image: mysql:5.7
        env:
          MYSQL_DATABASE: drupal
          MYSQL_USER: drupal
          MYSQL_PASSWORD: drupal
          MYSQL_ROOT_PASSWORD: drupal
        ports:
          - 33306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - name: Restore Cache
        uses: actions/cache@v4
        with:
          path: |
            vendor
            docroot/core
            docroot/libraries
            docroot/modules/contrib
          key: 1.0-${{ hashFiles('blt/blt.yml') }}-${{ hashFiles('composer.json') }}-${{ hashFiles('composer.lock') }}
      - run: git config --system --add safe.directory '*'
      - name: Install Site
        run: |
          mysql -h mysql -P 3306 -u root -pdrupal -e 'SET GLOBAL max_allowed_packet=67108864;' &&
          rm -rf /var/www/html &&
          ln -snf $GITHUB_WORKSPACE /var/www/html &&
          composer install -n &&
          vendor/bin/blt blt:telemetry:disable --no-interaction &&
          blt settings &&
          mkdir -p docroot/sites/default/files &&
          chmod -R 777 docroot/sites/default/files/ &&
          blt drupal:install -n
      - name: Restore theme node_modules
        uses: actions/cache@v4
        with:
          path: ${{ env.themePath }}/node_modules
          key: ${{ runner.os }}-${{ hashFiles(format('{0}/package-lock.json', env.themePath)) }}
      - name: Compile theme assets
        run: npm run build --prefix $themePath
      - name: Codeception Acceptance Tests
        run: |
          apachectl stop
          apachectl start
          blt codeception --group=install --suite=acceptance
      - name: Save Acceptance Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codeception--acceptance
          path: /var/www/html/artifacts
  deploy_branch:
    needs:
      - test_phpunit
      - lint_theme
      - test_functional
      - test_acceptance
    runs-on: ubuntu-latest
    container:
      image: pookmish/drupal8ci:php8.3
      options: '--network-alias drupal8ci'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Restore Cache
        uses: actions/cache@v4
        with:
          path: |
            vendor
            docroot/core
            docroot/libraries
            docroot/modules/contrib
          key: 1.0-${{ hashFiles('blt/blt.yml') }}-${{ hashFiles('composer.json') }}-${{ hashFiles('composer.lock') }}
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY }}
          name: id_rsa
          known_hosts: ${{ secrets.KNOWN_HOSTS }}
          if_key_exists: fail
      - run: git config --system --add safe.directory '*'
      - name: Restore theme node_modules
        uses: actions/cache@v4
        with:
          path: ${{ env.themePath }}/node_modules
          key: ${{ runner.os }}-${{ hashFiles(format('{0}/package-lock.json', env.themePath)) }}
      - name: Deploy Branch
        run: |
          git config --global user.email "sws-developers@lists.stanford.edu" &&
          git config --global user.name "Github Actions" &&
          ssh-keyscan -t rsa svn-23450.prod.hosting.acquia.com >> /root/.ssh/known_hosts &&
          composer install -n &&
          blt blt:telemetry:disable --no-interaction &&
          blt deploy -n
