services:
  # What to call the service hosting the site.
  suhumsci:
    # Use PHP 8 with Apache
    image: pookmish/drupal8ci:tugboat

    # Set this as the default service. This does a few things
    #   1. Clones the git repository into the service container
    #   2. Exposes port 80 to the Tugboat HTTP proxy
    #   3. Routes requests to the preview URL to this service
    default: true

    # Wait until the mysql service is done building
    depends: mysql
    aliases:
      - hs-colorful
      - hs-traditional
      - statistics
      - biologyvirtualshowcase
      - biocapstoneshowcase

    # A set of commands to run while building this service
    commands:
      # Commands that set up the basic preview infrastructure
      init:
        # Install Node.js system-wide based on .nvmrc major version for consistent builds
        - export NODE_VERSION=$(cat .nvmrc | cut -d. -f1) && curl -fsSL https://deb.nodesource.com/setup_$NODE_VERSION.x | bash - && apt-get install -y nodejs
        # Symlink the tugboat directory to the docker image expected path.
        - rm -rf /var/www/localhost
        - ln -snf ${TUGBOAT_ROOT} /var/www/localhost
        - ln -s docroot htdocs

        # Install/update packages managed by composer, including drush
        - rm -rf vendor
        - composer install --no-ansi

        # Init the settings files.
        - drush sws:multisite:settings
      update:
        - rm -rf vendor
        - composer install --no-ansi
        # Sync to hs_colorful, hs_colorful database & files and create user.
        - drush sql-sync @hs_colorful.prod @hs_colorful.local --create-db --structure-tables-key=lightweight --no-interaction --ansi
        - drush @hs_colorful.local sql-sanitize --no-interaction --ansi
        - drush rsync @hs_colorful.prod:%files @hs_colorful.local:%files --ansi --no-interaction
        - drush @hs_colorful.local user:create ${PREVIEWSITE_USERNAME} --password=${PREVIEWSITE_PASSWORD} || true
        - drush @hs_colorful.local user:role:add administrator ${PREVIEWSITE_USERNAME} || true

        # Sync to hs_traditional, hs_traditional database & files and create user.
        - drush sql-sync @hs_traditional.prod @hs_traditional.local --create-db --structure-tables-key=lightweight --no-interaction --ansi
        - drush @hs_traditional.local sql-sanitize --no-interaction --ansi
        - drush rsync @hs_traditional.prod:%files @hs_traditional.local:%files --ansi --no-interaction
        - drush @hs_traditional.local user:create ${PREVIEWSITE_USERNAME} --password=${PREVIEWSITE_PASSWORD} || true
        - drush @hs_traditional.local user:role:add administrator ${PREVIEWSITE_USERNAME} || true

        # Sync to statistics, statistics database & files and create user.
        - drush sql-sync @statistics.prod @statistics.local --create-db --structure-tables-key=lightweight --no-interaction --ansi
        - drush @statistics.local sql-sanitize --no-interaction --ansi
        - drush rsync @statistics.prod:%files @statistics.local:%files --ansi --no-interaction
        - drush @statistics.local user:create ${PREVIEWSITE_USERNAME} --password=${PREVIEWSITE_PASSWORD} || true
        - drush @statistics.local user:role:add administrator ${PREVIEWSITE_USERNAME} || true

        # Sync to biologyvirtualshowcase, biologyvirtualshowcase database & files and create user.
        - drush sql-sync @biologyvirtualshowcase.prod @biologyvirtualshowcase.local --create-db --structure-tables-key=lightweight --no-interaction --ansi
        - drush @biologyvirtualshowcase.local sql-sanitize --no-interaction --ansi
        - drush rsync @biologyvirtualshowcase.prod:%files @biologyvirtualshowcase.local:%files --ansi --no-interaction
        - drush @biologyvirtualshowcase.local user:create ${PREVIEWSITE_USERNAME} --password=${PREVIEWSITE_PASSWORD} || true
        - drush @biologyvirtualshowcase.local user:role:add administrator ${PREVIEWSITE_USERNAME} || true

        # Sync to biocapstoneshowcase, biocapstoneshowcase database & files and create user.
        - drush sql-sync @biocapstoneshowcase.prod @biocapstoneshowcase.local --create-db --structure-tables-key=lightweight --no-interaction --ansi
        - drush @biocapstoneshowcase.local sql-sanitize --no-interaction --ansi
        - drush rsync @biocapstoneshowcase.prod:%files @biocapstoneshowcase.local:%files --ansi --no-interaction
        - drush @biocapstoneshowcase.local user:create ${PREVIEWSITE_USERNAME} --password=${PREVIEWSITE_PASSWORD} || true
        - drush @biocapstoneshowcase.local user:role:add administrator ${PREVIEWSITE_USERNAME} || true

        - chown -R www-data:www-data ${TUGBOAT_ROOT}/docroot/sites/*/files
      build:
        - rm -rf vendor
        - composer install --no-ansi

        - drush @hs_colorful.local cr
        - drush @hs_colorful.local deploy

        - drush @hs_traditional.local cr
        - drush @hs_traditional.local deploy

        - drush @statistics.local cr
        - drush @statistics.local deploy

        - drush @biologyvirtualshowcase.local cr
        - drush @biologyvirtualshowcase.local deploy

        - drush @biocapstoneshowcase.local cr
        - drush @biocapstoneshowcase.local deploy

        # Build frontend assets. Prevent Puppeteer from downloading chrome because it's not needed here.
        - PUPPETEER_SKIP_DOWNLOAD=true npm run theme-build

    # Collection of urls to compare visual results.
    urls:
      hs-colorful:
        - /
        - /mixed-pages/mixed-page-raised-cards
        - /mixed-page-wells-raised-cards-full-width
        - /mixed-pages/mixed-page-wells-raised-cards-full-width-sidebar
        - /default-views/news
        - /default-views/events
        - /default-views/people
        - /components/hero-images-main-region/banner-images-partial-overlay-and-text
        - /components/hero-images-main-region/banner-images-text-box
        - /components/hero-images-full-width-region-and-main-region/tall-spotlights-classic
        - /components/text-area-typography
      hs-traditional:
        - /
        - /mixed-pages/mixed-page-raised-cards
        - /mixed-page-wells-raised-cards-full-width
        - /mixed-pages/mixed-page-wells-raised-cards-full-width-sidebar
        - /default-views/news
        - /default-views/events
        - /default-views/people
        - /components/hero-images-main-region/banner-images-partial-overlay-and-text
        - /components/hero-images-main-region/banner-images-text-box
        - /components/hero-images-full-width-region-and-main-region/tall-spotlights-classic
        - /components/text-area-typography
        - /test-empty-view-collection
  # What to call the service hosting MySQL. This name also acts as the
  # hostname to access the service by from the php service.
  mysql:
    # Use the latest available 8.x version of MySQL
    image: tugboatqa/mysql:8
    commands:
      init:
        # Increase the allowed packet size to 512MB.
        - mysql -e "SET GLOBAL max_allowed_packet=536870912;"
        # Ensure this packet size persists even if MySQL restarts.
        - echo "max_allowed_packet=536870912" >> /etc/mysql/conf.d/tugboat.cnf
      update:
        # Give the tugboat user access to the new databases.
        - mysql -e "GRANT ALL PRIVILEGES ON *.* TO 'tugboat'; FLUSH PRIVILEGES;"
