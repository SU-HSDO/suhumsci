services:
  # What to call the service hosting the site.
  suhumsci:
    # Use PHP 8 with Apache
    image: pookmish/drupal8ci:tugboat

    # Set this as the default service. This does a few things
    #   1. Clones the git repository into the service container
    #   2. Exposes port 80 to the Tugboat HTTP proxy
    #   3. Routes requests to the preview URL to this service
    default: true

    # Wait until the mysql service is done building
    depends: mysql
    aliases:
      - hs-colorful
      - hs-traditional
      - english
      - history
      - west

    # A set of commands to run while building this service
    commands:
      # Commands that set up the basic preview infrastructure
      init:
        # Install Node.js system-wide based on .nvmrc major version for consistent builds
        - export NODE_VERSION=$(cat .nvmrc | cut -d. -f1) && curl -fsSL https://deb.nodesource.com/setup_$NODE_VERSION.x | bash - && apt-get install -y nodejs
        # Symlink the tugboat directory to the docker image expected path.
        - rm -rf /var/www/localhost
        - ln -snf ${TUGBOAT_ROOT} /var/www/localhost
        - ln -s docroot htdocs

        # Install/update packages managed by composer, including drush
        - rm -rf vendor
        - composer install --no-ansi

        # Init the settings files.
        - drush sws:multisite:settings
      update:
        - rm -rf vendor
        - composer install --no-ansi
        # Sync to hs_colorful, hs_colorful database & files and create user.
        - drush sql-sync @hs_colorful.prod @hs_colorful.local --create-db --structure-tables-key=lightweight --no-interaction --ansi
        - drush @hs_colorful.local sql-sanitize --no-interaction --ansi
        - drush rsync @hs_colorful.prod:%files @hs_colorful.local:%files --ansi --no-interaction
        - drush @hs_colorful.local user:create tugboat --password=pushcar || true
        - drush @hs_colorful.local user:role:add administrator tugboat || true

        # Sync to hs_traditional, hs_traditional database & files and create user.
        - drush sql-sync @hs_traditional.prod @hs_traditional.local --create-db --structure-tables-key=lightweight --no-interaction --ansi
        - drush @hs_traditional.local sql-sanitize --no-interaction --ansi
        - drush rsync @hs_traditional.prod:%files @hs_traditional.local:%files --ansi --no-interaction
        - drush @hs_traditional.local user:create tugboat --password=pushcar || true
        - drush @hs_traditional.local user:role:add administrator tugboat || true

        # Sync to english, english database & files, does not create a user.
        - drush sql-sync @english.prod @english.local --create-db --structure-tables-key=lightweight --no-interaction --ansi
        - drush @english.local sql-sanitize --no-interaction --ansi
        - drush rsync @english.prod:%files @english.local:%files --ansi --no-interaction

        # Sync to history, history database & files, does not create a user.
        - drush sql-sync @history.prod @history.local --create-db --structure-tables-key=lightweight --no-interaction --ansi
        - drush @history.local sql-sanitize --no-interaction --ansi
        - drush rsync @history.prod:%files @history.local:%files --ansi --no-interaction

        # Sync to west, west database & files, does not create a user.
        - drush sql-sync @west.prod @west.local --create-db --structure-tables-key=lightweight --no-interaction --ansi
        - drush @west.local sql-sanitize --no-interaction --ansi
        - drush rsync @west.prod:%files @west.local:%files --ansi --no-interaction

        - chown -R www-data:www-data ${TUGBOAT_ROOT}/docroot/sites/*/files
      build:
        - rm -rf vendor
        - composer install --no-ansi

        - drush @hs_colorful.local cr
        - drush @hs_colorful.local eval '\Drupal::moduleHandler()->loadInclude("user", "install");user_update_10000();'
        - drush @hs_colorful.local deploy

        - drush @hs_traditional.local cr
        - drush @hs_traditional.local eval '\Drupal::moduleHandler()->loadInclude("user", "install");user_update_10000();'
        - drush @hs_traditional.local deploy

        - drush @english.local cr
        - drush @english.local eval '\Drupal::moduleHandler()->loadInclude("user", "install");user_update_10000();'
        - drush @english.local deploy

        - drush @history.local cr
        - drush @history.local eval '\Drupal::moduleHandler()->loadInclude("user", "install");user_update_10000();'
        - drush @history.local deploy

        - drush @west.local cr
        - drush @west.local eval '\Drupal::moduleHandler()->loadInclude("user", "install");user_update_10000();'
        - drush @west.local deploy

        # Build frontend assets.
        - npm run theme-build

    # Collection of urls to compare visual results.
    visual_regression_options:
      threshold: 0.1
      delay: 10000
    urls:
      hs-colorful:
        - /
        - /mixed-pages/mixed-page
        - /mixed-pages/mixed-page-raised-cards
        - /mixed-page-wells-raised-cards-full-width
        - /mixed-pages/mixed-page-wells
        - /mixed-pages/mixed-page-wells-raised-cards-full-width-sidebar
        - /default-views/news
        - /default-views/events
        - /default-views/people
        - /default-views/publications
        - /news/jackelyn-hwang-wins-jane-addams-award-best-article-community-and-urban-sociology-section
        - /events/colloquium-series/sociology-department-colloquium-robert-braun
        - /people/abhinanda-sarkar
        - /publications/privilege-and-punishment-how-race-and-class-matter-criminal-court
        - /collection-real-world-examples
        - /collection-real-world-examples-w-well
        - /collection-real-examples-uniform-and-stretch
        - /componentshero-images-main-region/hero-gradient-slider
        - /hero-images-main-region/hero-layered-slider
        - /componentshero-images-main-region/hero-no-text
        - /componentshero-images-main-region/hero-overlay
        - /components/photo-album
        - /components/text-area-typography
        - /components/vertical-timeline-view-using-events-ct
        - /components/hero-images-main-region/banner-images-partial-overlay-and-text
        - /components/hero-images-main-region/banner-images-text-box
        - /components/hero-images-full-width-region-and-main-region/tall-spotlights-classic
        - /components/accordions
        - /components/callout-box
        - /components/color-bands
        - /components/collections/collections-postcards
      hs-traditional:
        - /
        - /mixed-pages/mixed-page
        - /mixed-pages/mixed-page-raised-cards
        - /mixed-page-wells-raised-cards-full-width
        - /mixed-pages/mixed-page-wells
        - /mixed-pages/mixed-page-wells-raised-cards-full-width-sidebar
        - /default-views/news
        - /default-views/events
        - /default-views/people
        - /default-views/publications
        - /news/jackelyn-hwang-wins-jane-addams-award-best-article-community-and-urban-sociology-section
        - /events/colloquium-series/sociology-department-colloquium-robert-braun
        - /people/abhinanda-sarkar
        - /publications/privilege-and-punishment-how-race-and-class-matter-criminal-court
        - /collection-real-world-examples
        - /collection-real-world-examples-w-well
        - /collection-real-examples-uniform-and-stretch
        - /componentshero-images-main-region/hero-gradient-slider
        - /hero-images-main-region/hero-layered-slider
        - /componentshero-images-main-region/hero-no-text
        - /componentshero-images-main-region/hero-overlay
        - /components/photo-album
        - /components/text-area-typography
        - /components/vertical-timeline-view-using-events-ct
        - /components/hero-images-main-region/banner-images-partial-overlay-and-text
        - /components/hero-images-main-region/banner-images-text-box
        - /components/hero-images-full-width-region-and-main-region/tall-spotlights-classic
        - /components/accordions
        - /components/callout-box
        - /components/color-bands
        - /components/collections/collections-postcards
      english:
        - /
      history:
        - /
      west:
        - /
  # What to call the service hosting MySQL. This name also acts as the
  # hostname to access the service by from the php service.
  mysql:
    # Use the latest available 8.x version of MySQL
    image: tugboatqa/mysql:8
    commands:
      init:
        # Increase the allowed packet size to 512MB.
        - mysql -e "SET GLOBAL max_allowed_packet=536870912;"
        # Ensure this packet size persists even if MySQL restarts.
        - echo "max_allowed_packet=536870912" >> /etc/mysql/conf.d/tugboat.cnf
      update:
        # Give the tugboat user access to the new databases.
        - mysql -e "GRANT ALL PRIVILEGES ON *.* TO 'tugboat'; FLUSH PRIVILEGES;"
