project:
  machine_name: suhumsci
  prefix: suhumsci
  human_name: 'Stanford Humanities and Sciences Product'
  profile:
    name: su_humsci_profile
  local: {  }
git:
  default_branch: develop-build
  remotes:
    - 'humscigryphon@svn-2314.prod.hosting.acquia.com:humscigryphon.git'
deploy:
  tag_source: false
  exclude_file: '${repo.root}/blt/deploy/rsync-exclude.txt'
  gitignore_file: '${repo.root}/blt/deploy/.gitignore'
  dir: '${repo.root}/deploy'
drush:
  aliases:
    ci: self
    prod: '${project.machine_name}.prod'
  default_alias: '${drush.aliases.local}'
modules:
  local:
    enable: {  }
    uninstall:
      - acquia_connector
      - purge
  ci:
    enable: {  }
    uninstall:
      - purge
      - acquia_connector
  dev:
    enable:
      - acquia_connector
      - stage_file_proxy
    uninstall: {  }
  test:
    enable:
      - acquia_connector
      - stage_file_proxy
    uninstall: {  }
  prod:
    enable:
      - acquia_connector
    uninstall:
      - stage_file_proxy
