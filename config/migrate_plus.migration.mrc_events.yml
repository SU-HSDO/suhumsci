process:
  title:
    plugin: callback
    callable: trim
    source: title
  status: constants/status
  type: constants/type
  body/value: body
  body/format: constants/basic_html
  promote: featured
  field_hs_event_admission: admission
  field_hs_event_contact_email: email
  field_hs_event_contact_phone: phone
  field_hs_event_date/value: startDate
  field_hs_event_date/end_value: endDate
  field_hs_event_link/uri: linkUrl
  field_hs_event_link/title: linkTitle
  custm_mrc_event_series:
    -
      plugin: skip_on_empty
      method: process
      source: eventSeries
    -
      plugin: entity_lookup
      value_key: name
      bundle_key: vid
      bundle: custm_mrc_event_series
      entity_type: taxonomy_term
      ignore_case: true
      access_check: false
  field_hs_event_sponsor: sponsor
  field_hs_event_type:
    -
      plugin: skip_on_empty
      source: type
      method: process
    -
      plugin: explode
      delimiter: '|'
    -
      plugin: callback
      callable: rtrim
    -
      plugin: callback
      callable: htmlspecialchars_decode
    -
      plugin: entity_generate
      value_key: name
      bundle_key: vid
      bundle: hs_event_type
      entity_type: taxonomy_term
      ignore_case: true
  field_hs_event_video:
    -
      plugin: skip_on_empty
      method: process
      source: videoUrl
    -
      plugin: entity_generate
      source: videoName
      value_key: name
      bundle_key: bundle
      bundle: video
      entity_type: media
      ignore_case: true
      values:
        field_media_oembed_video: videoUrl
  field_hs_event_location: location
  field_hs_event_map_link/uri: mapUrl
  field_hs_event_map_link/title: mapTitle
  field_hs_event_speaker:
    -
      plugin: skip_on_empty
      method: process
      source: speaker
    -
      plugin: explode
      delimiter: '|'
    -
      plugin: callback
      callable: rtrim
    -
      plugin: entity_generate_no_lookup
      value_key: title
      bundle_key: type
      bundle: speaker
      entity_type: event_collections
      ignore_case: true
  image_file:
    -
      plugin: skip_on_empty
      method: process
      source: imageUri
    -
      plugin: file_import
      destination: constants/image_destination
      id_only: true
      reuse: true
  field_hs_event_image/target_id:
    -
      plugin: skip_on_empty
      method: process
      source: imageUri
    -
      plugin: skip_on_empty
      method: process
      source: '@image_file'
    -
      plugin: entity_generate
      source: imageName
      value_key: name
      bundle_key: bundle
      bundle: image
      entity_type: media
      ignore_case: true
      values:
        field_media_image/target_id: '@image_file'
        field_media_image/alt: imageAlt
destination:
  plugin: 'entity:node'
migration_dependencies:
