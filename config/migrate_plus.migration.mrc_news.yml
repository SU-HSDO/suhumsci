uuid: 71ce90ce-4af7-4434-b0cd-b6b383729050
langcode: en
status: true
dependencies: {  }
id: mrc_news
class: null
field_plugin_method: null
cck_plugin_method: null
migration_tags: {  }
migration_group: hs_d7_content
label: 'MRC News'
source:
  track_changes: true
  plugin: url
  data_fetcher_plugin: file
  data_parser_plugin: json
  urls:
    - https://mrc.stanford.edu/api/news
  constants:
    status: 1
    type: hs_news
    basic_html: basic_html
    image_destination: 'public://media/visitors/'
    june_first: '-06-01'
  item_selector: /
  fields:
    -
      name: uuid
      label: uuid
      selector: uuid
    -
      name: title
      label: title
      selector: title
    -
      name: body
      label: body
      selector: body
    -
      name: byline
      label: byline
      selector: byline
    -
      name: categories
      label: categories
      selector: categories
    -
      name: featured
      label: featured
      selector: featured
    -
      name: linkUrl
      label: linkUrl
      selector: linkUrl
    -
      name: linkTitle
      label: linkTitle
      selector: linkTitle
    -
      name: eventSeries
      label: eventSeries
      selector: eventSeries
    -
      name: imageUri
      label: imageUri
      selector: imageUri
    -
      name: imageAlt
      label: imageAlt
      selector: imageAlt
    -
      name: imageName
      label: imageName
      selector: imageName
    -
      name: date
      label: date
      selector: date
  ids:
    uuid:
      type: string
process:
  title: title
  status: constants/status
  type: constants/type
  body/value: body
  body/format: constants/basic_html
  promote: featured
  field_hs_news_link/uri: linkUrl
  field_hs_news_link/title: linkTitle
  field_news_byline: byline
  field_hs_news_date: date
  custm_news_event:
    -
      plugin: skip_on_empty
      source: eventSeries
      method: process
    -
      plugin: entity_generate
      value_key: name
      bundle_key: vid
      bundle: custm_mrc_event_series
      entity_type: taxonomy_term
      ignore_case: true
  field_hs_news_categories:
    -
      plugin: skip_on_empty
      method: process
      source: categories
    -
      plugin: explode
      delimiter: '|'
    -
      plugin: entity_generate
      value_key: name
      bundle_key: vid
      bundle: hs_news_categories
      entity_type: taxonomy_term
      ignore_case: true
  image_file:
    -
      plugin: skip_on_empty
      method: process
      source: imageUri
    -
      plugin: file_import
      destination: constants/image_destination
      id_only: true
      reuse: true
  field_hs_news_image/target_id:
    -
      plugin: skip_on_empty
      method: process
      source: imageUri
    -
      plugin: skip_on_empty
      method: process
      source: '@image_file'
    -
      plugin: entity_generate
      source: imageName
      value_key: name
      bundle_key: bundle
      bundle: image
      entity_type: media
      ignore_case: true
      values:
        field_media_image/target_id: '@image_file'
        field_media_image/alt: imageAlt
destination:
  plugin: 'entity:node'
migration_dependencies:
  required:
    - mrc_terms
