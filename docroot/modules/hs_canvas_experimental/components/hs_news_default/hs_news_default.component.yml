$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: HS News Default
canvas: false
version: '1.0.0'
props:
  type: object
  properties:
    title:
      type: string
      title: 'News Title'
    byline:
      type: string
      title: 'Author Byline'
    date:
      type: string
