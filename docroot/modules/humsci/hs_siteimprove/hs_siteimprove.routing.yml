hs_siteimprove.api_settings_form:
  path: '/admin/config/services/siteimprove'
  defaults:
    _form: '\Drupal\hs_siteimprove\Form\SiteImproveSettingsForm'
    _title: 'SiteImprove API Settings'
  requirements:
    _permission: 'administer siteimprove'
  options:
    _admin_route: TRUE

hs_siteimprove.site_details:
  path: '/admin/config/services/siteimprove/details'
  defaults:
    _form: '\Drupal\hs_siteimprove\Form\SiteImproveDetailsForm'
    _title: 'SiteImprove Site Details'
  requirements:
    _permission: 'administer siteimprove'
