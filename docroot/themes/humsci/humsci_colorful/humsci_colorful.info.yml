type: theme
base theme: humsci_basic
description: A colorful and polished theme.
package: 'Humanities & Sciences'
core_version_requirement: ^9.4 || ^10

ckeditor5-stylesheets:
  - css/ckeditor.css

regions:
  page_top: 'Page top'
  global_message: Global Message
  header: Header
  search: Search
  menu: Menu
  highlighted: Highlighted
  help: Help
  content: Content
  footer: Footer
  page_bottom: 'Page bottom'

libraries:
  - humsci_colorful/base

preload_fonts:
  - 'https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap'
