name: HumSci Traditional
type: theme
base theme: humsci_basic
description: A traditional theme.
package: 'Humanities & Sciences'
core_version_requirement: ^9.4 || ^10

ckeditor5-stylesheets:
  - css/ckeditor.css

regions:
  page_top: 'Page top'
  global_message: Global Message
  header: Header
  search: Search
  menu: Menu
  highlighted: Highlighted
  help: Help
  content: Content
  footer: Footer
  page_bottom: 'Page bottom'

libraries:
  - humsci_traditional/base

preload_fonts:
  - url: 'https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap'
    type: 'style'
  - url: 'https://www-media.stanford.edu/assets/fonts/stanford.woff2'
    type: 'font'
