name: SU HumSci Gin Admin
type: theme
base theme: gin
description: "Gin specific overrides unique to Stanford Humsci"
core_version_requirement: ^8.8 || ^9 || ^10
version: "1.0"
hidden: false
dependencies:
  - humsci_basic:humsci_basic
  - hs_layouts:hs_layouts

libraries:
  - claro/global-styling
  - gin/gin
  - su_humsci_gin_admin/global-styling
  - su_humsci_gin_admin/fix-autocomplete-width

# Regions
regions:
  header: "Header"
  pre_content: "Pre-content"
  breadcrumb: Breadcrumb
  highlighted: Highlighted
  help: Help
  content: Content
  page_top: "Page top"
  page_bottom: "Page bottom"
  sidebar_first: "First sidebar"
regions_hidden:
  - sidebar_first

preload_fonts:
  - 'https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap'
