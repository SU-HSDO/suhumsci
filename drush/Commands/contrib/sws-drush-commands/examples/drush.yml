command:
  artifact:
    deploy:
      options:
        git-url:
          - foobar@github.com
        post-build-script: script-path.sh
        artifact-dir: deploy
  acquia:
    options:
      app-id: acquia-app-id
      app-key: key
      app-secret: secret
    alias-build:
      options:
        alias-dir: drush/sites
  sync-keys:
    options:
      sync-ssh: sshUrl
      sync-files:
        - /path/to/directory
        - /path/to/file.php
  source:
    build:
      settings:
        options:
          db-port: 3306
          db-host: mysql
          db-user: root
          db-pass: password
          db-name: drupal
          multisites:
            - default
